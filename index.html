<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Корейский по песням</title>
<meta name="theme-color" content="#0c0d15">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<style>
@font-face{font-family:'Inter';font-style:normal;font-weight:100 900;font-display:swap;
  src:url('./fonts/inter-latin.woff2') format('woff2');
  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+2074,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}
@font-face{font-family:'Inter';font-style:normal;font-weight:100 900;font-display:swap;
  src:url('./fonts/inter-cyrillic.woff2') format('woff2');
  unicode-range:U+0301,U+0400-045F,U+0490-0491,U+04B0-04B1,U+2116;}
:root{
  --bg:#0c0d15;--bg2:#0f1019;--surface:#161826;--surface2:#1c1f30;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#eaecf5;--text2:#a0a4bd;--text3:#6a6e88;
  --indigo:#8b93ff;--indigo2:#a98bff;--seal:#ff6b81;--gold:#e6bd80;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --font-ko:'Inter','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',var(--font);
  --radius:16px;--shadow:0 12px 32px -14px rgba(0,0,0,.65);}
*{box-sizing:border-box}
html,body{margin:0}
body{background:
    radial-gradient(1100px 600px at 88% -8%,rgba(139,147,255,.14),transparent 60%),
    radial-gradient(900px 520px at 4% 108%,rgba(255,107,129,.07),transparent 55%),
    var(--bg);
  color:var(--text);font-family:var(--font);line-height:1.55;letter-spacing:-.006em;
  -webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;}
.wrap{max-width:840px;margin:0 auto;padding:16px 15px 70px;}
header.top{display:flex;gap:13px;align-items:center;padding:18px 18px;border-radius:var(--radius);
  background:linear-gradient(135deg,rgba(139,147,255,.16),rgba(169,139,255,.09) 60%,transparent),var(--surface);
  border:1px solid var(--border);position:relative;overflow:hidden;}
header.top:before{content:"";position:absolute;inset:0;
  background:radial-gradient(420px 130px at 82% -10%,rgba(139,147,255,.22),transparent 70%);pointer-events:none;}
.seal{width:50px;height:50px;border-radius:14px;flex:none;display:flex;align-items:center;justify-content:center;
  font-size:1.7rem;font-family:'Nanum Myeongjo',var(--font-ko);color:#fff;
  background:linear-gradient(140deg,var(--indigo),var(--indigo2));
  box-shadow:0 6px 20px -4px rgba(139,147,255,.55),inset 0 0 0 1px rgba(255,255,255,.22);}
header.top h1{margin:0;font-size:1.32rem;font-weight:700;letter-spacing:-.02em;color:var(--text);}
header.top .k{font-size:.63rem;letter-spacing:.18em;text-transform:uppercase;color:var(--indigo);font-weight:600;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 16px;margin-top:15px;box-shadow:var(--shadow);}
textarea{width:100%;min-height:150px;padding:13px;border:1px solid var(--border2);border-radius:13px;
  font-family:var(--font-ko);font-size:1.05rem;line-height:1.5;resize:vertical;background:var(--bg2);color:var(--text);
  transition:border-color .15s,box-shadow .15s;}
textarea::placeholder{color:var(--text3);}
textarea:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 3px rgba(139,147,255,.18);}
textarea.drag{border-color:var(--indigo);background:rgba(139,147,255,.06);}
.row{display:flex;gap:11px;margin-top:12px;flex-wrap:wrap;}
.row .f{flex:1;min-width:120px;}
label{display:block;font-size:.66rem;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);margin-bottom:5px;font-weight:600;}
input[type=text],input[type=number]{width:100%;padding:11px 12px;border:1px solid var(--border2);border-radius:11px;
  background:var(--bg2);color:var(--text);font-size:1rem;font-family:var(--font);transition:border-color .15s,box-shadow .15s;}
input:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 3px rgba(139,147,255,.18);}
.opts{display:flex;gap:11px;margin-top:12px;}.opts .f{flex:1;}
button.fetch{margin-top:11px;width:100%;padding:11px;border:1px solid var(--border2);border-radius:11px;cursor:pointer;
  background:var(--surface2);color:var(--text);font-size:.9rem;font-family:var(--font);font-weight:500;transition:.15s;}
button.fetch:hover{border-color:var(--indigo);color:var(--indigo);}
.fetchnote{font-size:.8rem;color:var(--text2);margin-top:7px;min-height:1em;}
.fetchnote .warn{color:var(--gold);}
button.go{margin-top:14px;width:100%;padding:15px;border:0;border-radius:14px;cursor:pointer;
  background:linear-gradient(135deg,var(--indigo),var(--indigo2));color:#0c0d15;font-size:1.05rem;font-weight:700;
  font-family:var(--font);letter-spacing:-.01em;box-shadow:0 8px 26px -8px rgba(139,147,255,.6);transition:.15s;}
button.go:hover{filter:brightness(1.06);}button.go:active{transform:translateY(1px);}
button.go:disabled{opacity:.45;cursor:progress;box-shadow:none;}
.hint{font-size:.78rem;color:var(--text3);margin-top:10px;}
.samples{margin-top:13px;font-size:.82rem;color:var(--text2);}
.samples a{color:var(--indigo);cursor:pointer;text-decoration:none;border-bottom:1px dashed rgba(139,147,255,.4);}
.statusbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:18px 2px 10px;flex-wrap:wrap;}
.statusbar .st{font-size:.82rem;color:var(--text2);flex:1;}
#dls{display:flex;gap:8px;flex-wrap:wrap;}
.dl{padding:9px 13px;border:1px solid var(--border2);color:var(--text);background:var(--surface2);border-radius:11px;
  cursor:pointer;font-size:.82rem;font-family:var(--font);transition:.15s;}
.dl:hover{border-color:var(--indigo);color:var(--indigo);}
#lesson{margin-top:4px;}
.err{color:#ffb3c0;padding:14px;border:1px solid rgba(255,107,129,.4);border-radius:12px;background:rgba(255,107,129,.08);}
.foot{margin-top:32px;font-size:.74rem;color:var(--text3);text-align:center;}
#loading{position:fixed;inset:0;background:var(--bg);color:var(--text);display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:30px;z-index:99;}
#loading.hidden{display:none;}
#loading .sp{width:40px;height:40px;border:3px solid rgba(139,147,255,.2);border-top-color:var(--indigo);
  border-radius:50%;animation:sp .8s linear infinite;margin-bottom:20px;}
#loading .bigseal{font-size:2.7rem;margin-bottom:8px;font-family:'Nanum Myeongjo',var(--font-ko);
  background:linear-gradient(140deg,var(--indigo),var(--indigo2));-webkit-background-clip:text;background-clip:text;color:transparent;}
#loading #loading-msg{color:var(--text2);font-size:.95rem;max-width:320px;}
@keyframes sp{to{transform:rotate(360deg)}}
.tabs{display:flex;gap:6px;margin-top:15px;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:4px;}
.tab{flex:1;padding:9px;border:0;background:transparent;color:var(--text2);font-family:var(--font);font-size:.9rem;font-weight:600;border-radius:10px;cursor:pointer;transition:.15s;}
.tab.active{background:var(--surface2);color:var(--text);}
.tabcount{display:inline-block;min-width:18px;padding:0 5px;background:var(--indigo);color:#0c0d15;border-radius:10px;font-size:.72rem;font-weight:700;}
.tabcount:empty{display:none;}
#curate{margin-top:16px;}
.curk{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--indigo);font-weight:600;}
.curttl{font-size:1.2rem;font-weight:700;letter-spacing:-.02em;}
.curintro{color:var(--text2);font-size:.86rem;margin:4px 2px 15px;}
.warnbar{background:rgba(230,189,128,.1);border:1px solid rgba(230,189,128,.3);color:#e8cfa0;border-radius:11px;padding:10px 13px;font-size:.85rem;margin-bottom:12px;}
.cursec{margin-bottom:22px;}
.cursec-h{display:flex;justify-content:space-between;align-items:center;margin:0 2px 10px;}
.cursec-h h3{margin:0;font-size:1.02rem;font-weight:700;}
.cnt{display:inline-block;background:var(--surface2);color:var(--text2);font-size:.72rem;padding:1px 8px;border-radius:9px;margin-left:6px;font-weight:600;}
.selall{background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:.76rem;padding:5px 10px;border-radius:9px;cursor:pointer;font-family:var(--font);}
.selall:hover{border-color:var(--indigo);color:var(--indigo);}
.sel-card{display:flex;gap:11px;align-items:flex-start;}
.sel-card .sel-body{flex:1;min-width:0;}
input.sel{width:21px;height:21px;flex:none;margin-top:3px;accent-color:var(--indigo);cursor:pointer;}
.wordlist{display:flex;flex-direction:column;gap:8px;}
.wrow{display:flex;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;}
.wrow-ko{flex:1;min-width:0;}
.wrow-ko .wko{font-family:var(--font-ko);font-size:1.12rem;font-weight:700;color:var(--indigo);}
.wrow-meta{font-size:.7rem;color:var(--text3);font-style:italic;margin-top:1px;}
.wtr{width:40%;min-width:105px;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:8px 10px;color:var(--text);font-size:.9rem;font-family:var(--font);}
.wtr:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 2px rgba(139,147,255,.16);}
.savebar{position:sticky;bottom:0;padding:12px 0 8px;background:linear-gradient(transparent,var(--bg) 45%);}
.empty2{color:var(--text3);font-size:.9rem;padding:8px 2px;}
.empty3{text-align:center;color:var(--text2);padding:54px 20px;}
.empty3-i{font-size:2.4rem;margin-bottom:10px;}
.empty3-s{font-size:.85rem;color:var(--text3);margin:8px auto 0;max-width:320px;}
#savedList{margin-top:16px;display:flex;flex-direction:column;gap:10px;}
.mcard{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 15px;}
.mcard-main{flex:1;min-width:0;cursor:pointer;}
.mcard-ttl{font-size:1.08rem;font-weight:700;font-family:var(--font-ko);}
.mcard-art{color:var(--text3);font-weight:400;font-size:.9rem;}
.mcard-meta{font-size:.78rem;color:var(--text2);margin-top:3px;}
.mdel{flex:none;width:40px;height:40px;border:1px solid var(--border2);background:var(--surface2);border-radius:11px;color:var(--text2);font-size:1.05rem;cursor:pointer;transition:.15s;}
.mdel:hover{border-color:var(--seal);color:var(--seal);}
#materialView{margin-top:14px;}
.mvhead{display:flex;justify-content:space-between;margin-bottom:14px;}
.mvback{background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:11px;padding:9px 14px;cursor:pointer;font-family:var(--font);font-size:.85rem;}
.mvdel{background:transparent;border:1px solid rgba(255,107,129,.4);color:var(--seal);border-radius:11px;padding:9px 14px;cursor:pointer;font-family:var(--font);font-size:.85rem;}
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:11px 18px;border-radius:12px;font-size:.9rem;font-weight:500;box-shadow:0 12px 30px -10px rgba(0,0,0,.7);opacity:0;pointer-events:none;transition:.25s;z-index:200;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="loading">
  <div class="bigseal">學</div>
  <div class="sp"></div>
  <div id="loading-msg">Инициализация…</div>
</div>

<script>
// Показываем ЛЮБУЮ ошибку прямо на экране (чтобы было видно, где встаёт загрузка).
window.__kslErr = function (msg) {
  var el = document.getElementById('loading-msg');
  if (el) el.innerHTML = '<b style="color:#ffd6cf">Не удалось загрузить</b><br>' +
    '<span style="font-size:.78em;word-break:break-word;display:block;margin-top:8px">' + String(msg) + '</span>' +
    '<span style="font-size:.72em;opacity:.85;display:block;margin-top:12px">Пришли мне этот текст — починю.</span>';
};
window.addEventListener('error', function (e) {
  var m = (e && e.message) ? e.message : 'script error';
  if (e && e.filename) m += '  @ ' + e.filename.split('/').pop() + ':' + (e.lineno || '?');
  window.__kslErr(m);
});
window.addEventListener('unhandledrejection', function (e) {
  var r = e && e.reason; window.__kslErr('promise: ' + ((r && (r.stack || r.message)) || r || '?'));
});

// Сторож: если app.js не запустился за 7 сек — показываем настоящую причину.
window.__kslBooted = false;
setTimeout(function () {
  if (window.__kslBooted) return;
  var files = ['js/app.js', 'lib/index.js', 'lib/build/kiwi-wasm.js', 'data/grammar_db.json'];
  var out = ['origin: ' + location.origin,
    'SW активен: ' + (navigator.serviceWorker && navigator.serviceWorker.controller ? 'ДА (перезагрузи!)' : 'нет')];
  var left = files.length;
  files.forEach(function (f) {
    fetch(new URL(f, location.href).href, { cache: 'no-store' }).then(function (r) {
      var ct = (r.headers.get('content-type') || '?').split(';')[0];
      out.push(f.split('/').pop() + ': ' + r.status + ' ' + ct);
    }).catch(function (err) {
      out.push(f.split('/').pop() + ': ' + (err && err.name ? err.name + ' — ' + (err.message || '') : 'reject'));
    }).then(function () {
      if (--left === 0 && !window.__kslBooted) {
        window.__kslErr('app.js не запустился.<br><span style="font-size:.8em;line-height:1.7;word-break:break-word">' + out.join('<br>') + '</span>');
      }
    });
  });
}, 7000);
</script>

<div class="wrap">
  <header class="top">
    <div class="seal">學</div>
    <div><div class="k">노래로 배우는 한국어</div><h1>Корейский по песням</h1></div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="analyze">Разбор</button>
    <button class="tab" data-tab="saved">Мои материалы <span id="savedCount" class="tabcount"></span></button>
  </div>

  <div id="tab-analyze">
    <div class="panel">
      <textarea id="text" placeholder="Вставь корейский текст песни (한글)…"></textarea>
      <div class="row">
        <div class="f"><label>Название</label><input type="text" id="title" placeholder="첫눈"></div>
        <div class="f"><label>Исполнитель</label><input type="text" id="artist" placeholder="—"></div>
      </div>
      <button class="fetch" id="fetch">🔎 Найти текст по названию</button>
      <div class="fetchnote" id="fetchnote"></div>
      <button class="go" id="go" disabled>Разобрать песню</button>
      <div class="hint">Разбери песню → отметь нужные грамматики и слова → сохрани как свой материал. Всё офлайн, 🔊 — озвучка.</div>
      <div class="samples">Примеры: <a data-s="cheotnun">첫눈 (демо)</a> · <a data-s="arirang">아리랑</a></div>
    </div>
    <div id="curate"></div>
  </div>

  <div id="tab-saved" style="display:none">
    <div id="savedList"></div>
    <div id="materialView" style="display:none"></div>
  </div>

  <div class="foot">KoreanSongLesson · офлайн-разбор корейских песен (Kiwi WASM)</div>
</div>

<script type="module" src="./js/app.js?v=3"></script>
</body>
</html>
